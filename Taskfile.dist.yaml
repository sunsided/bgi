version: '3'

dotenv:
  - .env.local
  - .env

vars:
  # Build profile switching
  PROFILE: '{{ .PROFILE | default "debug" }}'                # accepts: debug|release
  PROFILE_FLAG: '{{ if eq .PROFILE "release" }}--release{{ end }}'
  PROFILE_DIR: '{{ if eq .PROFILE "release" }}release{{ else }}debug{{ end }}'

tasks:
  default:
    cmds:
      - cmd: task --list --sort=none
        silent: true

  sort:toml:
    preconditions:
      - sh: command -v cargo-sort
        msg: "cargo-sort not found — please install via cargo install cargo-sort"
    sources:
      - ./**/*.toml
    cmds:
      - cargo sort --workspace

  fmt:
    aliases:
      - format
    sources:
      - ./**/*.toml
      - ./**/*.rs
      - docs/review/*.md
    cmds:
      - task: sort:toml
      - cargo fmt --all

  lint:
    desc: Lint the code
    cmds:
      - cargo clippy --all --all-targets {{.CLI_ARGS}}

  lint-fix:
    internal: true
    cmds:
      - task: lint:fix
        vars:
          CLI_ARGS: '{{.CLI_ARGS}}'

  lint:fix:
    desc: Lint the code and apply fixes
    aliases:
      - fix
    cmds:
      - cargo clippy --all --all-targets --fix --allow-staged {{.CLI_ARGS}}
      - task: fmt

  check:
    desc: Run checks on the code (format check)
    cmds:
      - cargo fmt --all --check

  gc:
    desc: Clean up outdated build artifacts
    preconditions:
      - sh: command -v cargo-gc
        msg: "cargo-gc not found — please install via cargo install cargo-gc-bin"
    cmds:
      - cargo gc

  sweep:
    desc: Clean outdated build artifacts by timestamp (see also gc)
    preconditions:
      - sh: command -v cargo-sweep
        msg: "cargo-sweep not found — please install via cargo install cargo-sweep"
    cmds:
      - cargo sweep --installed

  clean:
    desc: Clean all build artifacts (use sweep for a lightweight clean)
    status:
      - test ! -d target
    cmds:
      - cargo clean

  build:
    desc: Build in debug mode
    sources:
      - Cargo.toml
      - Cargo.lock
      - src/**/*.rs
      - examples/**/*.rs
    cmds:
      - cargo build {{.PROFILE_FLAG}}

  build:timing:
    desc: Build with timings (nightly)
    requires:
      vars:
        - name: PROFILE
          enum:
            - debug
            - release
    cmds:
      - cargo +nightly build --timings=html,json -Zunstable-options {{.PROFILE_FLAG}}

  test:
    desc: Run all tests
    env:
      RUST_LOG: disabled
    deps: [ fmt ]
    cmds:
      - cargo test --all {{.CLI_ARGS}}

  test:docs:
    desc: Run doctests only
    env:
      RUST_LOG: disabled
    cmds:
      - cargo test --all --doc {{.CLI_ARGS}}

  update:pre-commit:
    desc: Update pre-commit hooks
    aliases:
      - update:prek
    preconditions:
      - sh: command -v prek
        msg: "prek not found — please install from https://github.com/j178/prek"
    cmds:
      - prek autoupdate

  update:
    desc: Update pre-commit hooks and dependencies
    cmds:
      - task: update:pre-commit
      - cargo update

  upgrade:deps:
    desc: Upgrade the dependencies
    cmds:
      - cargo upgrade
      - cargo update

  run:
    desc: Run an example (pass example name via CLI_ARGS)
    aliases:
      - example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example {{.CLI_ARGS}}

  build:examples:
    desc: Build all examples
    sources:
      - Cargo.toml
      - Cargo.lock
      - src/**/*.rs
      - examples/**/*.rs
    cmds:
      - cargo build {{.PROFILE_FLAG}} --features visual-backend --examples

  run:simple:
    desc: Run the simple example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example simple

  run:test_backend:
    desc: Run the test_backend example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example test_backend

  run:mandelbrot:
    desc: Run the mandelbrot example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example mandelbrot

  run:mandelbrot_batched:
    desc: Run the mandelbrot_batched example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example mandelbrot_batched

  run:batch_test:
    desc: Run the batch_test example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example batch_test

  run:input_debug:
    desc: "Run the input_debug example (interactive: focus window and press keys)"
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example input_debug

  run:debug_backend_integration:
    desc: Run the debug_backend_integration example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example debug_backend_integration

  run:debug_window:
    desc: Run the debug_window example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example debug_window

  run:minimal_demo:
    desc: Run the minimal_demo example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example minimal_demo

  run:window_test:
    desc: Run the window_test example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example window_test

  run:interactive_demo:
    desc: "Run the interactive_demo example (animated graphics demo)"
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example interactive_demo

  run:compatibility:
    desc: Run the compatibility example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example compatibility

  run:bgi_device_modes:
    desc: Run the bgi_device_modes example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example bgi_device_modes

  run:bgi_example:
    desc: Run the bgi_example example
    cmds:
      - cargo run {{.PROFILE_FLAG}} --features visual-backend --example bgi_example

  convert:
    desc: Convert BGI font C files to Rust source
    cmds:
      - cargo run --no-default-features --features=_convert --bin convert {{.ROOT_DIR}}/c
      - mv {{.ROOT_DIR}}/c/*.rs src/
      - task: fmt

  fuzz:targets:
    desc: List all fuzzing targets
    cmds:
      - cargo fuzz list

  fuzz:
    desc: Run fuzzing on the specified target
    vars:
      TARGET: { sh: 'echo {{.CLI_ARGS}}' }
    env:
      RUSTFLAGS: -Z sanitizer=address
    cmds:
      - cargo +nightly fuzz run {{.TARGET}}

  docs:
    desc: Build the documentation; use docs:open to also open it
    sources:
      - ./**/*.toml
      - ./**/*.rs
    generates:
      - target/doc/**
    cmds:
      - rm -rf target/doc
      - cargo doc --workspace --document-private-items --no-deps {{.CLI_ARGS}}

  docs:open:
    desc: Build and open the docs
    aliases:
      - open:docs
    cmds:
      - task: docs
        vars:
          CLI_ARGS: --open {{.CLI_ARGS}}

  crev:verify:
    desc: Verify the current project against crev
    cmds:
      - cargo crev verify {{.CLI_ARGS | default "--show-all"}}

  crev:update:
    desc: Update crev public proofs
    cmds:
      - cargo crev repo fetch all
